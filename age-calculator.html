<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만나이 계산기 - 세는나이 연나이 한번에 확인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#222;padding:16px}
.wrap{max-width:520px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
h1{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.badge{display:inline-block;background:#e8f4fd;color:#2980b9;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:12px}

label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
input[type=date]{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;color:#222;background:#fafafa;outline:none;transition:.2s}
input[type=date]:focus{border-color:#3498db;background:#fff}

.btn{width:100%;padding:14px;background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;letter-spacing:.5px}
.btn:active{opacity:.9}

.result-area{display:none}
.main-result{text-align:center;padding:24px 16px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;color:#fff;margin-bottom:14px}
.main-result .label{font-size:13px;opacity:.85;margin-bottom:6px}
.main-result .age-num{font-size:56px;font-weight:800;line-height:1}
.main-result .age-unit{font-size:18px;font-weight:600;opacity:.9}
.main-result .bday-msg{font-size:12px;margin-top:10px;opacity:.8;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;display:inline-block}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.box{background:#f8f9fa;border-radius:12px;padding:16px;text-align:center;border:1.5px solid #eee}
.box .bl{font-size:12px;color:#888;margin-bottom:4px}
.box .bv{font-size:24px;font-weight:700;color:#2c3e50}
.box .bunit{font-size:12px;color:#888}
.box.highlight{background:#fff8e1;border-color:#f39c12}
.box.highlight .bv{color:#e67e22}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.info-box{background:#f0f7ff;border-radius:12px;padding:14px;text-align:center}
.info-box .il{font-size:11px;color:#7f8c8d;margin-bottom:4px}
.info-box .iv{font-size:16px;font-weight:700;color:#2980b9}

.dday-box{background:linear-gradient(135deg,#11998e,#38ef7d);border-radius:12px;padding:16px;text-align:center;color:#fff;margin-bottom:14px}
.dday-box .dl{font-size:12px;opacity:.85;margin-bottom:4px}
.dday-box .dv{font-size:32px;font-weight:800}
.dday-box .ds{font-size:12px;opacity:.8;margin-top:4px}

.compare{background:#fff;border:1.5px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:14px}
.compare-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.compare-row:last-child{border-bottom:none}
.compare-row .cr-label{flex:1;font-size:13px;color:#555}
.compare-row .cr-val{font-size:16px;font-weight:700;color:#2c3e50}
.compare-row .cr-desc{font-size:11px;color:#aaa;margin-left:6px}
.compare-row.active{background:#f0f7ff}
.compare-row.active .cr-label{color:#2980b9;font-weight:600}
.compare-row.active .cr-val{color:#2980b9}

.note{font-size:12px;color:#999;line-height:1.6;padding:12px 14px;background:#f9f9f9;border-radius:8px;border-left:3px solid #ddd}
.note strong{color:#666}

.reset-btn{width:100%;padding:11px;background:#f5f5f5;color:#666;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <span class="badge">✅ 2023년 만나이 통일법 반영</span>
  <h1>🎂 만나이 계산기</h1>
  <p class="sub">생년월일만 입력하면 만나이·세는나이·연나이를 한번에 확인!</p>

  <label for="birth">생년월일을 입력하세요</label>
  <input type="date" id="birth" max="">

  <button class="btn" onclick="calc()">나이 계산하기</button>
</div>

<div class="result-area" id="resultArea">

  <div class="main-result" id="mainResult">
    <div class="label">만 나이 (법적 나이)</div>
    <div><span class="age-num" id="manAge">--</span> <span class="age-unit">세</span></div>
    <div class="bday-msg" id="bdayMsg"></div>
  </div>

  <div class="grid">
    <div class="box">
      <div class="bl">세는나이 (한국식)</div>
      <div class="bv" id="seAge">--</div>
      <div class="bunit">세</div>
    </div>
    <div class="box highlight">
      <div class="bl">연나이</div>
      <div class="bv" id="yearAge">--</div>
      <div class="bunit">세</div>
    </div>
  </div>

  <div class="dday-box">
    <div class="dl">🎉 다음 생일까지</div>
    <div class="dv" id="ddayVal">--</div>
    <div class="ds" id="ddayDate"></div>
  </div>

  <div class="info-grid">
    <div class="info-box">
      <div class="il">🐯 띠</div>
      <div class="iv" id="zodiac">--</div>
    </div>
    <div class="info-box">
      <div class="il">⭐ 별자리</div>
      <div class="iv" id="star">--</div>
    </div>
  </div>

  <div class="card" style="padding:16px">
    <p style="font-size:13px;font-weight:700;color:#444;margin-bottom:10px">📊 나이 계산법 비교</p>
    <div class="compare">
      <div class="compare-row active">
        <span class="cr-label">🟦 만나이</span>
        <span class="cr-val" id="cMan">--</span><span class="cr-desc">세 — 법적 기준</span>
      </div>
      <div class="compare-row">
        <span class="cr-label">🟧 세는나이</span>
        <span class="cr-val" id="cSe">--</span><span class="cr-desc">세 — 태어나면 1세</span>
      </div>
      <div class="compare-row">
        <span class="cr-label">🟩 연나이</span>
        <span class="cr-val" id="cYear">--</span><span class="cr-desc">세 — 연도 차이</span>
      </div>
    </div>
    <p class="note"><strong>만나이</strong>는 2023년 6월부터 한국 법적 공식 나이입니다. 행정서류·의료·법률 모든 분야에서 만나이를 사용합니다.</p>
  </div>

  <button class="reset-btn" onclick="reset()">다시 계산하기</button>
</div>

</div>
<script>
const ZODIAC=['쥐🐭','소🐮','호랑이🐯','토끼🐰','용🐲','뱀🐍','말🐴','양🐑','원숭이🐵','닭🐓','개🐶','돼지🐷'];
const STAR=[
  {name:'염소자리♑',m:1,d:20},{name:'물병자리♒',m:2,d:19},{name:'물고기자리♓',m:3,d:21},
  {name:'양자리♈',m:4,d:20},{name:'황소자리♉',m:5,d:21},{name:'쌍둥이자리♊',m:6,d:21},
  {name:'게자리♋',m:7,d:23},{name:'사자자리♌',m:8,d:23},{name:'처녀자리♍',m:9,d:23},
  {name:'천칭자리♎',m:10,d:23},{name:'전갈자리♏',m:11,d:23},{name:'사수자리♐',m:12,d:22}
];

// 오늘 날짜 max 설정
document.getElementById('birth').max = new Date().toISOString().split('T')[0];

function getZodiac(year){return ZODIAC[(year-4)%12];}
function getStar(m,d){
  for(let i=STAR.length-1;i>=0;i--){
    if(m>STAR[i].m||(m===STAR[i].m&&d>=STAR[i].d)) return STAR[i].name;
  }
  return STAR[STAR.length-1].name;
}

function calc(){
  const val = document.getElementById('birth').value;
  if(!val){alert('생년월일을 입력해주세요!');return;}

  const birth = new Date(val);
  const today = new Date();
  today.setHours(0,0,0,0);

  const by=birth.getFullYear(), bm=birth.getMonth()+1, bd=birth.getDate();
  const ty=today.getFullYear(), tm=today.getMonth()+1, td=today.getDate();

  // 만나이
  let man = ty - by;
  const hadBday = (tm>bm)||(tm===bm&&td>=bd);
  if(!hadBday) man--;

  // 세는나이
  const se = ty - by + 1;

  // 연나이
  const yearAge = ty - by;

  // 다음 생일
  let nextBday = new Date(ty, bm-1, bd);
  if(nextBday <= today) nextBday = new Date(ty+1, bm-1, bd);
  const diffMs = nextBday - today;
  const diffDays = Math.ceil(diffMs/(1000*60*60*24));

  // 오늘 생일?
  const isBday = (tm===bm && td===bd);
  const ddayText = isBday ? '🎂 오늘이 생일!' : `D-${diffDays}`;
  const nextDateStr = `${nextBday.getFullYear()}년 ${bm}월 ${bd}일`;

  // 메시지
  const bdayMsg = isBday ? '🎉 생일 축하드려요!' :
    `다음 생일(${bm}/${bd})까지 ${diffDays}일 남았어요`;

  document.getElementById('manAge').textContent = man;
  document.getElementById('seAge').textContent = se;
  document.getElementById('yearAge').textContent = yearAge;
  document.getElementById('bdayMsg').textContent = bdayMsg;
  document.getElementById('ddayVal').textContent = ddayText;
  document.getElementById('ddayDate').textContent = isBday ? `만 ${man}세가 되셨어요!` : `다음 생일: ${nextDateStr}`;
  document.getElementById('zodiac').textContent = getZodiac(by);
  document.getElementById('star').textContent = getStar(bm, bd);
  document.getElementById('cMan').textContent = man;
  document.getElementById('cSe').textContent = se;
  document.getElementById('cYear').textContent = yearAge;

  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
}

function reset(){
  document.getElementById('birth').value='';
  document.getElementById('resultArea').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
