name: 자동 블로그 발행 (3시간 간격)

on:
  schedule:
    # KST 기준: 6시, 9시, 15시, 20시 (하루 4회)
    # UTC 기준: 21시(전날), 0시, 6시, 11시
    - cron: '0 21 * * *'   # KST 06:00
    - cron: '0 0 * * *'    # KST 09:00
    - cron: '0 6 * * *'    # KST 15:00
    - cron: '0 11 * * *'   # KST 20:00
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 한글 폰트 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-nanum
          fc-cache -fv

      - name: 패키지 설치
        run: |
          pip install anthropic requests google-auth google-auth-oauthlib \
          google-api-python-client cloudinary pillow google-genai

      - name: 자동 발행 실행
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: python auto_publish.py

      - name: 발행 상태 저장소에 커밋
        run: |
          git config user.email "duatkdtn@gmail.com"
          git config user.name "duatkdtn"
          git add today_keywords.json used_main_keywords.txt
          git diff --staged --quiet || git commit -m "발행 완료 상태 업데이트"
          git push
