name: 쇼핑커넥트 자동화

on:
  schedule:
    - cron: '0 17 * * *'  # 매일 UTC 17:00 = 한국시간 02:00 새벽에 실행 (06시부터 순차 발행)
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  shopping-automation:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests google-auth google-auth-oauthlib google-api-python-client

      - name: 쇼핑 자동화 실행
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_COOKIE: ${{ secrets.NAVER_COOKIE }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: "duatkdtn@gmail.com"
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
        run: python shopping_automation.py

      - name: 발행 기록 저장 (published_products.txt 커밋)
        run: |
          git config user.email "duatkdtn@gmail.com"
          git config user.name "duatkdtn"
          git add published_products.txt
          git diff --staged --quiet || git commit -m "쇼핑 발행 기록 업데이트"
          git push
